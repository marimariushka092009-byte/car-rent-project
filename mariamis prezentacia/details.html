<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1F0 Motors - Details</title>
  <link rel="icon" type="image/png" href="logo.png" />

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0b0b0b;
      color: white;
      padding: 28px 16px 60px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(225, 6, 0, 0.18);
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand h1 {
      font-size: 28px;
      font-style: italic;
      letter-spacing: 2px;
    }

    .brand h1 span {
      color: #e10600;
    }

    .brand p {
      color: #aaa;
      font-size: 11px;
      letter-spacing: 3px;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav a,
    .nav button {
      text-decoration: none;
      font-weight: bold;
      letter-spacing: 1px;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #222;
      background: #1a1a1a;
      color: white;
      cursor: pointer;
    }

    .nav .primary {
      background: #e10600;
      border-color: #e10600;
    }

    .back {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 8px;
      background: #1a1a1a;
      border: 1px solid #222;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .page {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }

    .panel {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      box-shadow: 0 0 35px rgba(225, 6, 0, 0.12);
      overflow: hidden;
    }

    .main-image {
      height: 430px;
      background: #0f0f0f;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .no-image {
      color: #777;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px;
    }

    .thumb {
      height: 110px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #222;
      cursor: pointer;
      background: #0f0f0f;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb.active {
      border-color: #e10600;
      box-shadow: 0 0 15px rgba(225, 6, 0, 0.25);
    }

    .info {
      padding: 22px;
    }

    .title {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .price {
      color: #e10600;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .spec {
      background: #151515;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 14px;
    }

    .spec b {
      display: block;
      color: #aaa;
      font-size: 12px;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .spec span {
      font-size: 15px;
      color: white;
    }

    .rent-box {
      margin-top: 12px;
      background: #151515;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 16px;
    }

    .rent-box h3 {
      margin-bottom: 12px;
    }

    .rent-box input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #222;
      background: #1a1a1a;
      color: white;
      outline: none;
      margin-bottom: 12px;
    }

    .rent-box input:focus {
      border-color: #e10600;
    }

    .rent-box button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: #e10600;
      color: white;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .rent-box button:hover {
      background: #b00500;
    }

    .status {
      margin-top: 12px;
      color: #aaa;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .main-image {
        height: 320px;
      }
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .thumbs {
        grid-template-columns: 1fr;
      }

      .main-image {
        height: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <h1>F1<span>F0</span></h1>
        <p>MOTORS</p>
      </div>
      <nav class="nav" id="navBar"></nav>
    </header>

    <a class="back" href="index.html">← Back to Home</a>

    <div class="page">
      <div class="panel">
        <div class="main-image" id="mainImage"></div>
        <div class="thumbs" id="thumbs"></div>
      </div>

      <div class="panel">
        <div class="info" id="carInfo"></div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const carId = params.get("id");

    function getUser() {
      try {
        return JSON.parse(localStorage.getItem("user")) || null;
      } catch {
        return null;
      }
    }

    function getPhone(user) {
      if (!user) return "";
      return user.phoneNumber || user.phone || "";
    }

    function logout() {
      localStorage.removeItem("user");
      localStorage.removeItem("token");
      location.href = "index.html";
    }

    function renderNav() {
      const user = getUser();
      const nav = document.getElementById("navBar");

      if (user) {
        nav.innerHTML = `
          <a href="index.html">HOME</a>
          <a href="add-car.html">ADD CAR</a>
          <a href="profile.html">PROFILE</a>
          <button class="primary" onclick="logout()">LOGOUT</button>
        `;
      } else {
        nav.innerHTML = `
          <a href="register.html">REGISTER</a>
          <a class="primary" href="login.html">LOGIN</a>
        `;
      }
    }

    function showMainImage(src) {
      const main = document.getElementById("mainImage");

      if (!src) {
        main.innerHTML = `<div class="no-image">NO IMAGE</div>`;
      } else {
        main.innerHTML = `<img src="${src}" alt="car image">`;
      }

      document.querySelectorAll(".thumb").forEach(function (item) {
        item.classList.remove("active");
        if (item.dataset.src === src) {
          item.classList.add("active");
        }
      });
    }

    function renderGallery(car) {
      let images = [
        car.imageUrl1,
        car.imageUrl2,
        car.imageUrl3,
        car.image1,
        car.image2,
        car.image3
      ].filter(Boolean);

      images = [...new Set(images)];

      showMainImage(images[0] || "");

      const thumbs = document.getElementById("thumbs");
      thumbs.innerHTML = images.map(function (img, index) {
        const safeImg = String(img).replace(/'/g, "\\'");
        return `
          <div class="thumb ${index === 0 ? "active" : ""}" data-src="${img}" onclick="showMainImage('${safeImg}')">
            <img src="${img}" alt="car thumb">
          </div>
        `;
      }).join("");
    }

    function renderInfo(car) {
      const info = document.getElementById("carInfo");

      info.innerHTML = `
        <div class="title">${car.brand || ""} ${car.model || ""} ${car.year ? "• " + car.year : ""}</div>
        <div class="price">${car.price || 0} ₾ / day</div>

        <div class="grid">
          <div class="spec"><b>CITY</b><span>${car.city || "-"}</span></div>
          <div class="spec"><b>SEATS</b><span>${car.capacity || "-"}</span></div>
          <div class="spec"><b>TRANSMISSION</b><span>${car.transmission || "-"}</span></div>
          <div class="spec"><b>FUEL CAPACITY</b><span>${car.fuelCapacity || "-"}</span></div>
          <div class="spec"><b>OWNER</b><span>${car.createdBy || "-"}</span></div>
          <div class="spec"><b>PHONE</b><span>${car.ownerPhoneNumber || "-"}</span></div>
        </div>

        <div class="rent-box">
          <h3>Rent this car</h3>
          <input type="number" id="days" min="1" value="1" placeholder="How many days?" />
          <button onclick="rentCar()">RENT NOW</button>
          <div class="status" id="rentStatus"></div>
        </div>
      `;
    }

    async function loadCar() {
      if (!carId) {
        document.getElementById("carInfo").innerHTML = `<div class="title">Car ID not found</div>`;
        document.getElementById("mainImage").innerHTML = `<div class="no-image">NO ID</div>`;
        return;
      }

      try {
        const res = await axios.get("https://rentcar.stepprojects.ge/api/Car/" + carId);
        const car = res.data;

        renderGallery(car);
        renderInfo(car);
      } catch (error) {
        document.getElementById("carInfo").innerHTML = `<div class="title">Car not found</div>`;
        document.getElementById("mainImage").innerHTML = `<div class="no-image">NOT FOUND</div>`;
      }
    }

    async function rentCar() {
      const user = getUser();

      if (!user) {
        Swal.fire({
          icon: "warning",
          title: "Login first",
          text: "მანქანის დასაქირავებლად ჯერ უნდა შეხვიდე ანგარიშში",
          background: "#111",
          color: "#fff",
          confirmButtonColor: "#E10600"
        }).then(() => {
          location.href = "login.html";
        });
        return;
      }

      const phoneNumber = getPhone(user);
      const days = Number(document.getElementById("days").value);
      const status = document.getElementById("rentStatus");

      if (!phoneNumber) {
        Swal.fire({
          icon: "error",
          title: "Error",
          text: "ტელეფონის ნომერი ვერ მოიძებნა",
          background: "#111",
          color: "#fff",
          confirmButtonColor: "#E10600"
        });
        return;
      }

      if (!days || days < 1) {
        Swal.fire({
          icon: "error",
          title: "Error",
          text: "დღეების რაოდენობა სწორად ჩაწერე",
          background: "#111",
          color: "#fff",
          confirmButtonColor: "#E10600"
        });
        return;
      }

      status.textContent = "Processing...";

      try {
        await axios.post("https://rentcar.stepprojects.ge/Purchase/purchase", null, {
          params: {
            phoneNumber: phoneNumber,
            carId: carId,
            multiplier: days
          }
        });

        status.textContent = "Car rented successfully";

        Swal.fire({
          icon: "success",
          title: "Success",
          text: "მანქანა წარმატებით იქირავე",
          background: "#111",
          color: "#fff",
          confirmButtonColor: "#E10600"
        });
      } catch (error) {
        status.textContent = "Rent failed";

        Swal.fire({
          icon: "error",
          title: "Error",
          text: "ქირაობა ვერ შესრულდა",
          background: "#111",
          color: "#fff",
          confirmButtonColor: "#E10600"
        });
      }
    }

    renderNav();
    loadCar();
  </script>
</body>
</html>
